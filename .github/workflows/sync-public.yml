# Syncs private main to the public repo in two steps:
#   1. Push stripped private main → public dev
#   2. Merge public dev → public main
#
# Required secrets in the private repo settings:
#   PUBLIC_REPO_TOKEN  — GitHub PAT with write access to the public repo
#   PUBLIC_REPO_NAME   — public repo path, e.g. "your-org/prism"

name: Sync to Public Repo

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
          fetch-depth: 0

      - name: Strip private files
        run: |
          rm -rf .kiro .claude private
          rm -f .github/workflows/sync-public.yml

      - name: Commit stripped version
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --staged --quiet || git commit -m "sync: strip private files"

      - name: Push to public dev branch
        run: |
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/${{ secrets.PUBLIC_REPO_NAME }}.git
          git push public HEAD:dev --force

      - name: Merge public dev into public main
        run: |
          git clone https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/${{ secrets.PUBLIC_REPO_NAME }}.git /tmp/public-repo
          cd /tmp/public-repo
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin
          if git show-ref --quiet refs/remotes/origin/main; then
            git checkout main
            git merge origin/dev --no-ff -m "sync: merge dev into main"
          else
            git checkout -b main origin/dev
          fi
          git push origin main
