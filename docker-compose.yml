# =============================================================================
# Prism — docker-compose for local development and testing
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up --build
#   3. Open http://localhost:8000
#
# To run in the background: docker compose up -d --build
# To view logs:             docker compose logs -f
# To stop:                  docker compose down
# =============================================================================

services:
  prism:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # allow time for embedder model to load
