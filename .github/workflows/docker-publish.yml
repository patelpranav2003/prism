# =============================================================================
# Prism — Docker image build and publish
#
# Triggers:
#   - Every push to main (publishes image tagged :latest)
#   - Every GitHub Release (publishes image tagged with the version, e.g. :v1.2.0)
#
# Image is published to GitHub Container Registry (GHCR):
#   ghcr.io/<your-github-org>/prism:latest
#   ghcr.io/<your-github-org>/prism:v1.2.0
#
# Other companies can then run:
#   docker run -e GITLAB_TOKEN=xxx -e ANTHROPIC_API_KEY=xxx \
#     ghcr.io/<your-github-org>/prism:latest
# =============================================================================

name: Publish Docker Image

on:
  push:
    branches:
      - main
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag :latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with version number on releases (e.g. v1.2.0)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
